<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>产品中心 - 河北州晖管道装备有限公司</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
        }
        .wrap {
            max-width: 480px;
            width: 100%;
            min-height: 100vh;
            margin: 0 auto;
            background: #ffffff;
        }
        .nav {
            background: #2c3e50;
            padding: 20px 15px;
            position: sticky;
            top: 0;
            z-index: 999;
        }
        .nav-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        .logo {
            color: white;
            font-size: 26px;
            font-weight: 800;
            text-align: center;
        }
        .nav-menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            flex-wrap: nowrap !important;
        }
        .nav-menu a {
            color: white;
            text-decoration: none;
            font-size: 13px;
        }
        .nav-menu a:hover {
            color: #3498db;
        }
        .container {
            width: 100%;
            padding: 50px 15px;
            margin: 0 auto;
        }
        .title {
            text-align: center;
            font-size: 26px;
            color: #2c3e50;
            margin-bottom: 35px;
            position: relative;
        }
        .title::after {
            content: "";
            width: 80px;
            height: 3px;
            background: #3498db;
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
        }
        .product-box {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .product-item {
            width: calc(50% - 12px);
            border: 1px solid #eee;
            border-radius: 5px;
            overflow: hidden;
            transition: 0.3s;
        }
        .product-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .product-item img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .product-item h3 {
            padding: 12px;
            text-align: center;
            color: #333;
            font-size: 15px;
        }
        .footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 30px 15px;
            font-size: 14px;
        }
        .footer p {
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="nav">
            <div class="nav-container">
                <div class="logo">河北州晖管道装备有限公司</div>
                <div class="nav-menu">
                    <a href="index.html">首页</a>
                    <a href="about.html">关于我们</a>
                    <a href="product.html">产品中心</a>
                    <a href="case.html">工程案例</a>
                    <a href="contact.html">联系我们</a>
                </div>
            </div>
        </div>

<div class="container">
    <h2 class="title">产品中心</h2>
    <div class="product-box" id="productWrap">
        <!-- JS自动填充产品，不用手写div -->
    </div>
</div>

        <div class="footer">
            <p>河北州晖管道装备有限公司 版权所有 © 2025</p>
            <p>地址：河北省沧州市盐山县 电话：153-7383-6272</p>
        </div>
    </div>
</body>
</html>
