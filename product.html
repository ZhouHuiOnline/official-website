            position: relative;
        }

            content: "";
            width: 80px;
            height: 3px;
            background: #3498db;
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
        }
        .product-box {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .product-item {
            width: calc(50% - 12px);
            border: 1px solid #eee;
            border-radius: 5px;
            overflow: hidden;
            transition: 0.3s;
        }
        .product-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .product-item img {
            width: 100%;
            height: 180px;

        }
        .product-item h3 {
            padding: 12px;
            text-align: center;
            color: #333;
            font-size: 15px;
        }
        .footer {
            background: #2c3e50;
            color: white;
            text-align: center;
